    <script>
      (function () {
        console.log(
          "%c Welcome to Vibe Gadgets! ",
          "background: #18181b; color: #fff; font-size: 16px; font-weight: bold; border-radius: 4px; padding: 4px;",
        );
        console.log(
          "%c Built with ❤️ by our Custom Dev Team.",
          "color: #ec4899; font-weight: bold; font-family: sans-serif; font-size: 14px;",
        );

        // Force replace http with https in images
        document.addEventListener("DOMContentLoaded", () => {
          const forceHttps = (node) => {
            if (
              node.tagName === "IMG" &&
              node.src &&
              node.src.startsWith("http://") &&
              !node.src.includes("localhost")
            ) {
              node.src = node.src.replace(/^http:\/\//i, "https://");
            }
          };

          const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
              if (
                mutation.type === "attributes" &&
                mutation.attributeName === "src"
              ) {
                forceHttps(mutation.target);
              } else if (mutation.addedNodes.length) {
                mutation.addedNodes.forEach((node) => {
                  if (node.tagName === "IMG") forceHttps(node);
                  else if (node.querySelectorAll) {
                    node.querySelectorAll("img").forEach(forceHttps);
                  }
                });
              }
            });
          });

          observer.observe(document.documentElement, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ["src"],
          });
        });

        const origLog = console.log;
        const origError = console.error;
        const origWarn = console.warn;
        const origInfo = console.info;
        const origDebug = console.debug;

        function shouldHide(args) {
          for (let i = 0; i < args.length; i++) {
            const arg = args[i];
            const checkMatch = (str) => {
              const lower = str.toLowerCase();
              return (
                lower.includes("firebase") ||
                lower.includes("gemini") ||
                lower.includes("run.app") ||
                lower.includes("vite") ||
                lower.includes("onesignal") ||
                lower.includes("vercel") ||
                lower.includes("ai") ||
                lower.includes("currentcolor") ||
                lower.includes("photo-155000") ||
                lower.includes("can only be used on") ||
                lower.includes("404")
              );
            };
            if (typeof arg === "string") {
              if (checkMatch(arg)) return true;
            } else if (arg && arg.message && typeof arg.message === "string") {
              if (checkMatch(arg.message)) return true;
            }
          }
          return false;
        }

        console.log = function (...args) {
          if (!shouldHide(args)) origLog.apply(console, args);
        };
        console.error = function (...args) {
          if (!shouldHide(args)) origError.apply(console, args);
        };
        console.warn = function (...args) {
          if (!shouldHide(args)) origWarn.apply(console, args);
        };
        console.info = function (...args) {
          if (!shouldHide(args)) origInfo.apply(console, args);
        };
        console.debug = function (...args) {
          if (!shouldHide(args)) origDebug.apply(console, args);
        };

        window.addEventListener("unhandledrejection", function (e) {
          if (e.reason && shouldHide([e.reason])) {
            e.preventDefault();
          }
        });
        window.addEventListener("error", function (e) {
          if (e.message && shouldHide([e.message])) {
            e.preventDefault();
          }
        });
      })();
    </script>

  <body
    oncontextmenu="return false;"

    <script>
      // Complete disable of copying
      document.addEventListener("copy", (e) => {
        e.clipboardData.setData("text/plain", "");
        e.preventDefault();
        return false;
      });
      document.addEventListener("cut", (e) => {
        e.preventDefault();
        return false;
      });
      document.addEventListener("paste", (e) => {
        e.preventDefault();
        return false;
      });

      // User agent checks for AI Bots
      const ua = navigator.userAgent.toLowerCase();
      const suspiciousBots = [
        "chatgpt",
        "gptbot",
        "anthropic",
        "claude",
        "google-extended",
        "googlebot",
        "lovable",
        "gemini",
        "studio",
        "ai",
      ];
      if (suspiciousBots.some((bot) => ua.includes(bot))) {
        document.write("Access denied. Blocked Site.");
        window.stop();
      }

      document.addEventListener("keyup", (e) => {
        if (e.key === "PrintScreen" || e.keyCode === 44) {
          navigator.clipboard.writeText("");
          document.body.style.display = "none";
          setTimeout(() => {
            document.body.style.display = "block";
          }, 2000);
        }
      });

      document.addEventListener("keydown", (e) => {
        // Block Mac screenshot shortcuts Cmd + Shift + 3/4/5
        if (
          e.metaKey &&
          e.shiftKey &&
          (e.key === "3" || e.key === "4" || e.key === "5")
        ) {
          navigator.clipboard.writeText("");
          document.body.style.display = "none";
          setTimeout(() => {
            document.body.style.display = "block";
          }, 2000);
        }
        // Block Windows Snipping tool Win + Shift + S
        if (e.metaKey && e.shiftKey && (e.key === "s" || e.key === "S")) {
          navigator.clipboard.writeText("");
          document.body.style.display = "none";
          setTimeout(() => {
            document.body.style.display = "block";
          }, 2000);
        }
        // Block Ctrl+C, Ctrl+A, Ctrl+P, Ctrl+S, Ctrl+U
        if (
          e.ctrlKey &&
          (e.key === "c" ||
            e.key === "C" ||
            e.key === "a" ||
            e.key === "A" ||
            e.key === "p" ||
            e.key === "P" ||
            e.key === "s" ||
            e.key === "S" ||
            e.key === "u" ||
            e.key === "U")
        ) {
          e.preventDefault();
          return false;
        }
        // Block Cmd+C, Cmd+A, Cmd+P, Cmd+S, Cmd+U on Mac
        if (
          e.metaKey &&
          (e.key === "c" ||
            e.key === "C" ||
            e.key === "a" ||
            e.key === "A" ||
            e.key === "p" ||
            e.key === "P" ||
            e.key === "s" ||
            e.key === "S" ||
            e.key === "u" ||
            e.key === "U")
        ) {
          e.preventDefault();
          return false;
        }
        // F12 etc
        if (e.keyCode === 123) {
          e.preventDefault();
          return false;
        }
        if (
          e.ctrlKey &&
          e.shiftKey &&
          (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)
        ) {
          e.preventDefault();
          return false;
        }
      });
      // Anti-console logic
      setInterval(function () {
        const before = new Date().getTime();
        debugger;
        const after = new Date().getTime();
        if (after - before > 100) {
          document.body.innerHTML =
            "Inspector detected. Please close the developer tools.";
        }
      }, 1000);

      // Anti-screenshot / Camera block using screenshot-privacy-protect
      // Initializing later in code.
    </script>
    <div id="root"></div>
    <script>
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        window.dispatchEvent(new Event("deferredprompt_ready"));
      });
    </script>
    <script type="module" src="/index.tsx"></script>
